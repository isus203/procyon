name: Gradle Package Manual Release

on:
  workflow_dispatch:
    inputs:
      next_snapshot_version:
        description: "Опционально. Следующая snapshot версия (например, 0.6.4-SNAPSHOT). Если пусто, патч-номер увеличится автоматически."
        required: false
        default: ""
      version_file:
        description: "Путь к Java файлу, содержащему константу VERSION."
        required: false
        # ЗАМЕНИТЕ ЭТОТ ПУТЬ НА ВАШ РЕАЛЬНЫЙ ПУТЬ К ФАЙЛУ
        default: "Procyon.Core/src/main/java/com/strobel/Procyon.java"

permissions:
  contents: write
  packages: write

concurrency:
  group: manual-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    if: ${{ github.ref_type == 'branch' }}
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          server-id: github
          settings-path: ${{ github.workspace }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Prepare version and Tag
        id: prep
        env:
          VERSION_FILE: ${{ github.event.inputs.version_file }}
          NEXT_SNAPSHOT_INPUT: ${{ github.event.inputs.next_snapshot_version }}
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if [[ ! -f "${VERSION_FILE}" ]]; then
            echo "Ошибка: Файл версии не найден по пути: ${VERSION_FILE}"
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Извлекаем текущую версию из файла
          version_line="$(grep -E 'String[[:space:]]+VERSION[[:space:]]*=' "${VERSION_FILE}" | head -n 1 || true)"
          current_version="$(echo "${version_line}" | sed -E 's/.*VERSION[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/')"
          
          echo "Текущая версия из файла: $current_version"
          
          if [[ "${current_version}" != *-SNAPSHOT ]]; then
            echo "Ошибка: Ожидалась версия с суффиксом -SNAPSHOT (например, 0.6.3-SNAPSHOT), но найдено: ${current_version}"
            exit 1
          fi

          # Версия для релиза (без -SNAPSHOT)
          release_version="${current_version%-SNAPSHOT}"
          
          # Определение следующей версии
          if [[ -n "${NEXT_SNAPSHOT_INPUT}" ]]; then
            next_snapshot_version="${NEXT_SNAPSHOT_INPUT}"
          else
            IFS='.' read -r major minor patch <<< "${release_version}"
            patch=$((patch + 1))
            next_snapshot_version="${major}.${minor}.${patch}-SNAPSHOT"
          fi

          echo "Релизная версия: $release_version"
          echo "Следующая версия в разработке: $next_snapshot_version"

          # 1. Меняем на версию релиза и пушим
          sed -i -E "s/(VERSION[[:space:]]*=[[:space:]]*\")[^\"]+(\")/\1${release_version}\2/" "${VERSION_FILE}"
          git add "${VERSION_FILE}"
          git commit -m "prepare release ${release_version}"
          
          # Проверка на существование тега, чтобы не было ошибки fatal: tag already exists
          if git rev-parse -q --verify "refs/tags/${release_version}" >/dev/null; then
            echo "Предупреждение: Тег ${release_version} уже существует. Пропускаю создание тега."
          else
            git tag "${release_version}"
            echo "Создан тег ${release_version}"
          fi
          
          git push origin "HEAD:${BRANCH_NAME}" --tags

          # Передаем переменные в следующие шаги
          echo "RELEASE_VERSION=${release_version}" >> $GITHUB_ENV
          echo "NEXT_VERSION=${next_snapshot_version}" >> $GITHUB_ENV

      - name: Build and Publish
        run: ./gradlew build publish
        env:
          USERNAME: ${{ github.actor }}
          TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump to Next Snapshot
        env:
          VERSION_FILE: ${{ github.event.inputs.version_file }}
          NEXT_VERSION: ${{ env.NEXT_VERSION }}
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          # 2. Устанавливаем следующую snapshot версию для дальнейшей разработки
          sed -i -E "s/(VERSION[[:space:]]*=[[:space:]]*\")[^\"]+(\")/\1${NEXT_VERSION}\2/" "${VERSION_FILE}"
          git add "${VERSION_FILE}"
          git commit -m "prepare for next development iteration ${NEXT_VERSION}"
          git push origin "HEAD:${BRANCH_NAME}"
